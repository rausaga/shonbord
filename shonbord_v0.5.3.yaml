meta:
  engine: 4.1.0
units:
  # Proxy Spacing Variables
  # Choc
  kx: cx
  ky: cy
  # MX (19mm)
  #kx: u
  #ky: u
  # MX with extra clearance for keycaps (19.05mm)
  #kx: U
  #ky: U
  # Padding Variables
  px: kx 
  py: ky 
  # double Padding Variables
  dpx: kx + 1
  dpy: ky + 1
  # Defaults to M2 Screws
  screwSize: 1.5
  standoffSize: 2.5
  # Outline positions relative to matrix_middle_home
  boXLeft: -2.675px
  boXRight: 4.40px
  boYTop: 1.625px
  boYBot: -3py
points:
  zones:
    matrix:
      key:
        padding: 1ky +0.5
        spread: 1kx +0.5
      anchor:
        rotate: 0
        shift: [100, -100]
      columns:
        pinky:
          rows:
            bottom:
              column_net: P9
            home:
              column_net: P20
            top:
              column_net: P4
        ring:
          key:
            stagger: 1py +0.5
          rows:
            bottom:
              column_net: P19
            home:
              column_net: P5
            top:
              column_net: P3
        middle:
          rows:
            bottom:
              column_net: P18
            home:
              column_net: P6
            top:
              column_net: P2
        index:
          rows:
            bottom:
              column_net: P15
            home:
              column_net: P7
            top:
              column_net: P0
        inner:
          rows:
            bottom:
              column_net: P14
            home:
              column_net: P8
            top:
              column_net: P1
      rows:
        bottom:
        home:
        top:
    thumb_fan:
      key:
        padding: 1ky
        spread: 1kx
      rotate: 0
      anchor:
        ref: matrix_inner_bottom
        shift: [0.0px, -1.0py-0.5]
      columns:
        home:
          rows:
            thumb:
              column_net: P16
          key:
            shift: [0.5px, 0]
        far:
          rows:
            thumb:
              column_net: P10
          key:
            rotate: -18
            stagger: -1
            shift: [0.625px, -0.125py]
      rows:
        thumb:
  rotate: 0
outlines:
  raw:
    - what: rectangle
      where: true
      size: [px, py]
  keys:
    - what: rectangle
      where: true
      size: [kx-0.5,ky-0.5]
  board:
    - what: polygon
      operation: stack
      points:
        - ref: matrix_middle_home
          shift: [boXLeft ,boYTop]
        - ref: matrix_middle_home
          shift: [boXRight,boYTop]
        - ref: matrix_middle_home
          shift: [boXRight,boYBot]
        - ref: matrix_middle_home
          shift: [boXLeft,boYBot]
      fillet: 4
  xlBoard:
    - what: polygon
      operation: stack
      points:
        - ref: matrix_middle_home
          shift: [-2.625dpx,1.6250dpy]
        - ref: matrix_middle_home
          shift: [4.25dpx,1.6250dpy]
        - ref: matrix_middle_home
          shift: [4.25dpx,-2.875dpy]
        - ref: matrix_middle_home
          shift: [-2.625dpx,-2.875dpy]
      fillet: 4
  combo:
    - name: board
    - operation: subtract
      name: keys
  chocswitches:
    - what: rectangle
      where: true
      size: [13.8,13.8]
  chocswitchplate:
    - name: board
    - operation: subtract
      name: chocswitches
  mounting:
    # m2_screw_botleft
    - what: circle
      radius: screwSize
      where:
        ref: [matrix_ring_bottom]
        shift: [-4,-25.5]
    # m2_screw_botright
    - what: circle
      radius: screwSize
      where:
        ref: [matrix_index_bottom]
        shift: [13,-25.5]
    # m2_screw_topleft
    - what: circle
      radius: screwSize
      where:
        ref: [matrix_pinky_top]
        shift: [-4,21.5]
    # m2_screw_topright
    - what: circle
      radius: screwSize
      where:
        ref: [matrix_inner_top]
        shift: [32.5,4]
  standoff:
    # m2_screw_botleft
    - what: circle
      radius: standoffSize
      where:
        ref: [matrix_middle_home]
        shift: [boXLeft+4,boYBot+4]
    # m2_screw_botright
    - what: circle
      radius: standoffSize
      where:
        ref: [matrix_middle_home]
        shift: [boXRight-4,boYBot+4]
    # m2_screw_topleft
    - what: circle
      radius: standoffSize
      where:
        ref: [matrix_middle_home]
        shift: [boXLeft+4,boYTop-4]
    # m2_screw_topright
    - what: circle
      radius: standoffSize
      where:
        ref: [matrix_middle_home]
        shift: [boXRight-4,boYTop-4]
pcbs:
  shonbord:
    template: kicad8
    outlines:
      main:
        outline: board
    footprints:
      choc_hotswap:
        what: ceoloide/switch_choc_v1_v2
        where: true
        params:
          from: GND
          to: "{{column_net}}"
          include_corner_marks: true
          include_keycap: true
          keycap_height: 16.5
          keycap_width: 17.5
          reversible: true
          solder: false
          hotswap: true
          choc_v2_support: true
          outer_pad_width_front: 2.0
          outer_pad_width_back: 2.0
      mcu:
        what: ceoloide/mcu_nice_nano
        params:
          reversible: true
          reverse_mount: true
          only_required_jumpers: true
        where:
          ref: matrix_inner_top
          shift: [26,-6.5]
          rotate: 0
      reset_button:
        what: ceoloide/reset_switch_smd_side
        params:
          reversible: true
        where:
          ref: matrix_inner_bottom
          shift: [39.5, 10]
          rotate: -90
      side_on_off_switch:
        what: ceoloide/power_switch_smd_side
        where: matrix_inner_bottom
        params:
          from: BAT_P
          to: RAW
          reversible: true
        adjust:
          shift: [39.5, -5]
      battery_connector:
        what: ceoloide/battery_connector_jst_ph_2
        where: matrix_inner_bottom
        params:
          reversible: true
        adjust:
          shift: [30.5, 0]
          rotate: -90
      led:
        what: ceoloide/led_sk6812mini-e
        where: matrix_pinky_top
        params:
          reversible: true 
          include_traces_vias: true 
          P1: VCC
          P2: LED_OUT
          P3: GND
          P4: LED_IN
        adjust:
          shift: [0, 17.5]
      m2_screw_botleft:
        what: ceoloide/mounting_hole_npth
        where: 
          ref: matrix_middle_home
        adjust:
          shift: [boXLeft+4,boYBot+4]
        params:
          hole_size: 4.6
          hole_drill: 2.2
      m2_screw_botright:
        what: ceoloide/mounting_hole_npth
        where: 
          ref: matrix_middle_home
        adjust:
          shift: [boXRight-4,boYBot+4]
        params:
          hole_size: 4.6
          hole_drill: 2.2
      m2_screw_topleft:
        what: ceoloide/mounting_hole_npth
        where: 
          ref: matrix_middle_home
        adjust:
          shift: [boXLeft+4,boYTop-4]
        params:
          hole_size: 4.6
          hole_drill: 2.2
      m2_screw_topright:
        what: ceoloide/mounting_hole_npth
        where: 
          ref: matrix_middle_home
        adjust:
          shift: [boXRight-4,boYTop-4]
        params:
          hole_size: 4.6
          hole_drill: 2.2
cases:
  bottom:
    - name: board
      extrude: 1
  xlBottom:
    - name: xlBoard
      extrude: 1
  _outerWall:
    - name: xlBoard
      extrude: 4
  _innerWall:
    - name: board
      extrude: 4
  wall:
    - what: case
      name: _outerWall
      operation: add
    - what: case
      name: _innerWall
      operation: subtract
  _holes:
    - name: mounting
      extrude: 4
  _standoffs:
    - name: standoff
      extrude: 4
  case:
    - what: case
      name: _standoffs
      operation: add
    - what: case
      name: _holes
      operation: subtract
    - what: case
      name: xlBottom
      operation: add
    - what: case
      name: wall
      operation: add